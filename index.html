<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusShop – Inicio</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="catalogo.html" class="hamburger" aria-label="Menú">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </a>
    <span class="logo">CampusShop</span>
    <div class="header-actions">
      <a href="carrito.html" class="cart-badge-wrap" aria-label="Carrito">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge">3</span>
      </a>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrapper">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Buscar productos, marcas...">
    </div>
  </div>

  <main class="main-content">

    <!-- CATEGORIES -->
    <section>
      <h2 class="section-title">Categorías Populares</h2>
      <div class="cards-container">
        <a href="catalogo.html" class="card">
          <div class="card-icon-wrap">🧥</div>
          <p>Abrigos</p>
        </a>
        <a href="catalogo.html" class="card">
          <div class="card-icon-wrap">👕</div>
          <p>Camisetas</p>
        </a>
        <a href="catalogo.html" class="card">
          <div class="card-icon-wrap">👖</div>
          <p>Pantalones</p>
        </a>
        <a href="catalogo.html" class="card">
          <div class="card-icon-wrap">👟</div>
          <p>Zapatillas</p>
        </a>
        <a href="catalogo.html" class="card">
          <div class="card-icon-wrap">🎒</div>
          <p>Mochilas</p>
        </a>
      </div>
    </section>

    <!-- NOVEDADES -->
    <section style="margin-top: 28px;">
      <h2 class="section-title">Novedades para ti</h2>
      <div class="product-grid">

        <a href="producto.html" class="product-card">
          <div class="product-card-img">
            <div class="placeholder-img" style="background:linear-gradient(135deg,#c8824a,#a05c2a);">🧥</div>
            <button class="btn-fav" aria-label="Favorito">♡</button>
          </div>
          <div class="product-card-info">
            <h3>Chaqueta de Cuero</h3>
            <div class="product-card-bottom">
              <span class="price">$120.00</span>
              <span class="btn-add-cart" aria-label="Agregar">+</span>
            </div>
          </div>
        </a>

        <a href="producto.html" class="product-card">
          <div class="product-card-img">
            <div class="placeholder-img" style="background:linear-gradient(135deg,#e8d5a3,#c8b57a);">👕</div>
            <button class="btn-fav" aria-label="Favorito">♡</button>
          </div>
          <div class="product-card-info">
            <h3>Camiseta Gráfica</h3>
            <div class="product-card-bottom">
              <span class="price">$35.00</span>
              <span class="btn-add-cart" aria-label="Agregar">+</span>
            </div>
          </div>
        </a>

        <a href="producto.html" class="product-card">
          <div class="product-card-img">
            <div class="placeholder-img" style="background:linear-gradient(135deg,#6ab0d4,#3a7a9c);">👖</div>
            <button class="btn-fav" aria-label="Favorito">♡</button>
          </div>
          <div class="product-card-info">
            <h3>Jeans Clásicos</h3>
            <div class="product-card-bottom">
              <span class="price">$75.00</span>
              <span class="btn-add-cart" aria-label="Agregar">+</span>
            </div>
          </div>
        </a>

        <a href="producto.html" class="product-card">
          <div class="product-card-img">
            <div class="placeholder-img" style="background:linear-gradient(135deg,#e8e8e8,#cccccc);">👟</div>
            <button class="btn-fav" aria-label="Favorito">♡</button>
          </div>
          <div class="product-card-info">
            <h3>Zapatillas Retro</h3>
            <div class="product-card-bottom">
              <span class="price">$90.00</span>
              <span class="btn-add-cart" aria-label="Agregar">+</span>
            </div>
          </div>
        </a>

      </div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="index.html" class="active">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      Inicio
    </a>
    <a href="catalogo.html">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </div>
      Categorías
    </a>
    <a href="carrito.html">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </div>
      Carrito
    </a>
    <a href="#">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      Favoritos
    </a>
    <a href="perfil.html">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      Perfil
    </a>
  </nav>

</body>
</html>
