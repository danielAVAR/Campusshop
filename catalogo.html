  <header class="page-header">

    <span class="header-title">Catálogo</span>
    <a href="carrito.html" class="cart-badge-wrap" aria-label="Carrito">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge">3</span>
    </a>

  <!-- FILTERS -->
  <div class="filters-row">
    <button class="filter-pill active">
      Talla
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="filter-pill">
      Color
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="filter-pill">
      Precio
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="filter-pill">
      Categoría
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

      <a href="producto.html" class="product-card">
        <div class="product-card-img">

          <span class="badge badge-oferta">Oferta</span>
        </div>
        <div class="product-card-info">
          <h3>Sudadera Clásica</h3>
          <div class="product-card-bottom">

            <span class="btn-add-cart">+</span>
          </div>
        </div>

      <a href="producto.html" class="product-card">
        <div class="product-card-img">
          <div class="placeholder-img" style="background:linear-gradient(135deg,#f5e6d3,#e8c9a0);">✦</div>
          <span class="badge badge-stock">Poco Stock</span>
        </div>
        <div class="product-card-info">
          <h3>Camiseta Orgánica</h3>
          <div class="product-card-bottom">
            <span class="price">$24.99</span>
            <span class="btn-add-cart">+</span>

          <span class="badge badge-stock">Poco Stock</span>

        <div class="product-card-info">
          <h3>Mochila Resistente</h3>
          <div class="product-card-bottom">
            <span class="price">$45.00</span>

      <a href="producto.html" class="product-card">

          <div class="product-card-bottom">
